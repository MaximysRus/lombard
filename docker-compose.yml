services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: lombard_user
      POSTGRES_PASSWORD: lombard_password
      POSTGRES_DB: lombard_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lombard_user -d lombard_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  db-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: lombard_user
      POSTGRES_PASSWORD: lombard_password
      POSTGRES_DB: lombard_test_db
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://lombard_user:lombard_password@db:5432/lombard_db?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "sleep 5 && 
             npx prisma db push && 
             npx prisma db seed && 
             npm run start:dev"

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000

volumes:
  pgdata: